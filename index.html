<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>假面骑士英雄档案 - Kamen Rider Hero Archive</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <span class="logo-icon">🦗</span>
        <span class="logo-text">假面骑士英雄档案</span>
      </div>

      <nav class="nav-links">
        <a href="#" class="nav-link active" data-nav="home">首页</a>
        <a href="#" class="nav-link" data-nav="heroes">骑士列表</a>
        <a href="#" class="nav-link" data-nav="about">关于</a>
      </nav>

      <div class="header-actions">
        <button class="btn-login" id="btnShowLogin">登 录</button>
        <div class="user-menu hidden" id="userMenu">
          <span class="user-greeting" id="userGreeting"></span>
          <button class="btn-logout" id="btnLogout">退出</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Hero Banner -->
  <section class="hero-banner" id="homeSection">
    <div class="banner-overlay"></div>
    <div class="banner-content">
      <h1 class="banner-title">假面骑士 · 时代的守护者</h1>
      <p class="banner-subtitle">从昭和到令和，探索每一位假面骑士的传奇故事与战斗精神</p>
      <div class="banner-stats">
        <div class="stat-item">
          <span class="stat-number" id="statCount">41</span>
          <span class="stat-label">骑士档案</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">3</span>
          <span class="stat-label">时代分类</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">54</span>
          <span class="stat-label">年历史</span>
        </div>
      </div>
    </div>
  </section>

  <!-- 主内容区 -->
  <main class="main-content" id="mainContent">
    <!-- 搜索和过滤栏 -->
    <section class="filter-bar" id="filterBar">
      <div class="filter-container">
        <!-- 搜索框 -->
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="搜索假面骑士名称、能力、描述..."
            autocomplete="off"
            name="rider-search"
            value=""
          >
          <button class="search-clear hidden" id="searchClear">✕</button>
        </div>

        <!-- 分类过滤 -->
        <div class="category-filters">
          <button class="cat-btn active" data-category="all">全部</button>
          <button class="cat-btn cat-showa" data-category="showa">🌟 昭和骑士</button>
          <button class="cat-btn cat-heisei" data-category="heisei">💎 平成骑士</button>
          <button class="cat-btn cat-reiwa" data-category="reiwa">🚀 令和骑士</button>
        </div>
      </div>
    </section>

    <!-- 骑士卡片网格 -->
    <section class="heroes-grid" id="heroesGrid">
      <!-- 动态生成 -->
    </section>

    <!-- 无结果提示 -->
    <div class="no-results hidden" id="noResults">
      <div class="no-results-icon">🔍</div>
      <h3>没有找到匹配的骑士</h3>
      <p>请尝试其他搜索关键词或切换分类</p>
    </div>
  </main>

  <!-- 骑士详情弹窗 -->
  <div class="modal-overlay hidden" id="detailModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-body" id="modalBody">
        <!-- 动态生成 -->
      </div>
    </div>
  </div>

  <!-- 登录/注册弹窗 -->
  <div class="modal-overlay hidden" id="authModal">
    <div class="modal-content auth-modal-content">
      <button class="modal-close" id="authModalClose">✕</button>

      <!-- 登录表单 -->
      <div class="auth-form" id="loginForm">
        <div class="auth-header">
          <h2>欢迎回来</h2>
          <p>登录以解锁全部功能</p>
        </div>
        <div class="form-group">
          <label for="loginUsername">用户名或邮箱</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名或邮箱">
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码">
        </div>
        <div class="form-error hidden" id="loginError"></div>
        <button class="btn-auth-submit" id="btnLogin">登 录</button>
        <p class="auth-switch">
          还没有账号？<a href="#" id="showRegister">立即注册</a>
        </p>
      </div>

      <!-- 注册表单 -->
      <div class="auth-form hidden" id="registerForm">
        <div class="auth-header">
          <h2>创建账号</h2>
          <p>加入假面骑士的世界</p>
        </div>
        <div class="form-group">
          <label for="regUsername">用户名</label>
          <input type="text" id="regUsername" placeholder="2-20个字符">
        </div>
        <div class="form-group">
          <label for="regEmail">邮箱</label>
          <input type="email" id="regEmail" placeholder="请输入邮箱地址">
        </div>
        <div class="form-group">
          <label for="regPassword">密码</label>
          <input type="password" id="regPassword" placeholder="至少6位密码">
        </div>
        <div class="form-group">
          <label for="regPasswordConfirm">确认密码</label>
          <input type="password" id="regPasswordConfirm" placeholder="再次输入密码">
        </div>
        <div class="form-error hidden" id="registerError"></div>
        <button class="btn-auth-submit" id="btnRegister">注 册</button>
        <p class="auth-switch">
          已有账号？<a href="#" id="showLogin">返回登录</a>
        </p>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-logo">
        <span class="logo-icon">🦗</span>
        <span>假面骑士英雄档案</span>
      </div>
      <p class="footer-text">假面骑士的传说，跨越半个世纪的英雄史诗</p>
      <p class="footer-copy">&copy; 2024 Kamen Rider Hero Archive. 数据仅供学习参考。</p>
      <p class="footer-copy">1971年，石之森章太郎创造了这个不朽的英雄形象</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
